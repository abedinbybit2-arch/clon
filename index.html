// ─── AI CHATBOT ────────────────────────────────────────
function AIChatbot() {
  const [open, setOpen] = useState(false);
  const [messages, setMessages] = useState([
    { role:'assistant', content:'আমি ঢাকা শিক্ষা বোর্ডের AI সহকারী। SSC/HSC ফলাফল, আবেদন প্রক্রিয়া বা যেকোনো তথ্য জানতে আমাকে জিজ্ঞেস করুন! 🎓' }
  ]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const chatRef = useRef(null);

  useEffect(() => {
    if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight;
  }, [messages]);

  const send = async () => {
    if (!input.trim() || loading) return;
    const userMsg = input.trim();
    setInput('');
    setMessages(prev => [...prev, { role:'user', content: userMsg }]);
    setLoading(true);

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method:'POST',
        headers:{ 'Content-Type':'application/json' },
        body: JSON.stringify({
          model:'claude-sonnet-4-20250514',
          max_tokens: 1000,
          system: `আপনি ঢাকা শিক্ষা বোর্ড (BISE Dhaka) এর AI সহকারী। শুধুমাত্র বাংলায় উত্তর দিন। 
          বোর্ড সংক্রান্ত তথ্য যেমন: SSC/HSC পরীক্ষার ফলাফল, আবেদন প্রক্রিয়া, নাম সংশোধন, সার্টিফিকেট উত্তোলন, ভর্তি তথ্য এবং শিক্ষা বোর্ডের সেবাসমূহ সম্পর্কে সংক্ষিপ্ত ও তথ্যবহুল উত্তর দিন। 
          অফিসের ঠিকানা: ১৩-১৪ জয়নাগ রোড, বকশিবাজার, ঢাকা-১২১১। ইমেইল: infobisedhaka@gmail.com`,
          messages: [
            ...messages.filter(m => m.role !== 'assistant' || messages.indexOf(m) > 0).map(m => ({
              role: m.role,
              content: m.content
            })),
            { role:'user', content: userMsg }
          ]
        })
      });
      const data = await res.json();
      const reply = data.content?.[0]?.text || 'দুঃখিত, উত্তর পাওয়া যায়নি।';
      setMessages(prev => [...prev, { role:'assistant', content: reply }]);
    } catch(e) {
      setMessages(prev => [...prev, { role:'assistant', content:'দুঃখিত! এই মুহূর্তে সংযোগ সমস্যা হচ্ছে। পরে আবার চেষ্টা করুন।' }]);
    }
    setLoading(false);
  };

  return (
    <>
      {/* CHAT BUTTON */}
      <button onClick={() => setOpen(!open)}
        className="fixed bottom-6 right-6 w-14 h-14 bg-board-600 hover:bg-board-700 text-white rounded-full shadow-2xl flex items-center justify-center text-2xl z-50 transition-all duration-300 hover:scale-110 ring-4 ring-yellow-400">
        {open ? '✕' : '🤖'}
      </button>

      {/* CHAT WINDOW */}
      {open && (
        <div className="fixed bottom-24 right-6 w-80 bg-white dark:bg-gray-800 rounded-2xl shadow-2xl z-50 overflow-hidden border border-gray-200 dark:border-gray-600 animate-slideUp">
          <div className="bg-gradient-to-r from-board-700 to-board-500 px-4 py-3 flex items-center gap-3">
            <div className="w-8 h-8 bg-yellow-400 rounded-full flex items-center justify-center text-sm font-bold text-gray-800">🤖</div>
            <div>
              <p className="text-white font-semibold text-sm">AI সহকারী</p>
              <p className="text-blue-200 text-xs">ঢাকা শিক্ষা বোর্ড</p>
            </div>
            <div className="ml-auto flex items-center gap-1">
              <div className="w-2 h-2 bg-green-400 rounded-full animate-pulse"></div>
              <span className="text-green-300 text-xs">অনলাইন</span>
            </div>
          </div>

          <div ref={chatRef} className="chat-scroll p-3 flex flex-col gap-3">
            {messages.map((m, i) => (
              <div key={i} className={`flex ${m.role==='user' ? 'justify-end' : 'justify-start'}`}>
                <div className={`max-w-xs rounded-2xl px-3 py-2 text-xs leading-relaxed shadow-sm ${
                  m.role==='user'
                    ? 'bg-board-600 text-white rounded-br-sm'
                    : 'bg-gray-100 dark:bg-gray-700 text-gray-800 dark:text-gray-100 rounded-bl-sm'
                }`}>
                  {m.content}
                </div>
              </div>
            ))}
            {loading && (
              <div className="flex justify-start">
                <div className="bg-gray-100 dark:bg-gray-700 rounded-2xl rounded-bl-sm px-4 py-2 text-xs text-gray-600 dark:text-gray-300">
                  <span className="wave-text">
                    <span>.</span><span>.</span><span>.</span>
                  </span>
                </div>
              </div>
            )}
          </div>

          <div className="border-t border-gray-200 dark:border-gray-600 p-2 flex gap-2">
            <input
              value={input}
              onChange={e => setInput(e.target.value)}
              onKeyDown={e => e.key==='Enter' && send()}
              placeholder="প্রশ্ন করুন..."
              className="flex-1 text-xs px-3 py-2 rounded-xl border border-gray-200 dark:border-gray-600 bg-gray-50 dark:bg-gray-700 text-gray-800 dark:text-gray-100 outline-none focus:border-board-500 transition-colors"
            />
            <button onClick={send} disabled={loading}
              className="bg-board-600 hover:bg-board-700 disabled:opacity-50 text-white w-8 h-8 rounded-xl flex items-center justify-center text-sm transition-colors flex-shrink-0">
              ➤
            </button>
          </div>
          <div className="px-3 pb-2 flex gap-2 flex-wrap">
            {['ফলাফল কীভাবে দেখব?', 'নাম সংশোধন করব কীভাবে?', 'অফিসের ঠিকানা'].map((q, i) => (
              <button key={i} onClick={() => { setInput(q); }}
                className="text-xs bg-blue-50 dark:bg-gray-700 text-board-600 dark:text-blue-300 px-2 py-1 rounded-full hover:bg-blue-100 dark:hover:bg-gray-600 transition-colors border border-blue-200 dark:border-gray-500">
                {q}
              </button>
            ))}
          </div>
        </div>
      )}
    </>
  );
}

// ─── RESULT SIDEBAR ────────────────────────────────────

      <div className="p-4 flex flex-col gap-3">

          className="text-xs px-3 py-2 border border-gray-200 dark:border-gray-600 rounded-lg bg-gray-50 dark:bg-gray-700 dark:text-gray-200 focus:border-board-500 outline-none w-full">
          <option value="">পরীক্ষা নির্বাচন করুন</option>
          <option>SSC / সমমান</option>
          <option>HSC / সমমান</option>
        </select>
        <select value={year} onChange={e => setYear(e.target.value)}
          className="text-xs px-3 py-2 border border-gray-200 dark:border-gray-600 rounded-lg bg-gray-50 dark:bg-gray-700 dark:text-gray-200 focus:border-board-500 outline-none w-full">
          <option value="">সাল নির্বাচন করুন</option>
          <option>২০২৫</option><option>২০২৪</option><option>২০২৩</option>
        </select>
        <input value={roll} onChange={e => setRoll(e.target.value)} placeholder="রোল নম্বর"
          className="text-xs px-3 py-2 border border-gray-200 dark:border-gray-600 rounded-lg bg-gray-50 dark:bg-gray-700 dark:text-gray-200 focus:border-board-500 outline-none w-full"/>
        <input value={reg} onChange={e => setReg(e.target.value)} placeholder="রেজিস্ট্রেশন নম্বর"
          className="text-xs px-3 py-2 border border-gray-200 dark:border-gray-600 rounded-lg bg-gray-50 dark:bg-gray-700 dark:text-gray-200 focus:border-board-500 outline-none w-full"/>
        <button onClick={check}
          className="bg-green-600 hover:bg-green-700 text-white text-xs font-semibold py-2 rounded-lg transition-colors w-full">
          ফলাফল দেখুন →
        </button>
        {msg && <p className="text-xs text-center text-gray-600 dark:text-gray-300 bg-gray-50 dark:bg-gray-700 rounded px-2 py-1">{msg}</p>}
      </div>
    </div>
  );
}
